<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2 id="jhi-recruteur-heading" data-cy="RecruteurCreateUpdateHeading" jhiTranslate="opportunitesApp.recruteur.home.createOrEditLabel">
        Créer ou éditer un Recruteur
      </h2>

      <div>
        <jhi-alert-error />

        @if (editForm.controls.id.value !== null) {
          <div class="mb-3">
            <label class="form-label" for="field_id" jhiTranslate="opportunitesApp.recruteur.id">ID</label>
            <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
          </div>
        }

        <div class="mb-3">
          <label class="form-label" for="field_titreProfessionnel" jhiTranslate="opportunitesApp.recruteur.titreProfessionnel"
            >Titre Professionnel</label
          >
          <input
            type="text"
            class="form-control"
            name="titreProfessionnel"
            id="field_titreProfessionnel"
            data-cy="titreProfessionnel"
            formControlName="titreProfessionnel"
          />
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_biographie" jhiTranslate="opportunitesApp.recruteur.biographie">Biographie</label>
          <textarea
            class="form-control"
            name="biographie"
            id="field_biographie"
            data-cy="biographie"
            formControlName="biographie"
          ></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_user" jhiTranslate="opportunitesApp.recruteur.user">User</label>
          <select class="form-control" id="field_user" data-cy="user" name="user" formControlName="user" [compareWith]="compareUser">
            <option [ngValue]="null"></option>
            @for (userOption of usersSharedCollection; track $index) {
              <option [ngValue]="userOption">{{ userOption.id }}</option>
            }
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="field_organisation" jhiTranslate="opportunitesApp.recruteur.organisation">Organisation</label>
          <select
            class="form-control"
            id="field_organisation"
            data-cy="organisation"
            name="organisation"
            formControlName="organisation"
            [compareWith]="compareOrganisation"
          >
            <option [ngValue]="null"></option>
            @for (organisationOption of organisationsSharedCollection; track $index) {
              <option [ngValue]="organisationOption">{{ organisationOption.id }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
